<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciando Sesión - Control de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary justify-content-center" style="min-height: 100vh;">
    
    <main class="form-signin w-100 m-auto" style="max-width: 340px;">
        <div id="alert-container"></div>
        
        <form id="login-form" novalidate>
            <img id="login-logo" class="mb-4 d-block mx-auto" src="https://cdn-icons-png.flaticon.com/512/5087/5087579.png" alt="Logo de Seguridad" width="72" height="72">
            
            <h1 class="h4 mb-3 fw-normal text-center">Autentificación de Operador</h1>

            <div class="form-floating mb-2">
                <input type="text" class="form-control" id="username" placeholder="Usuario">
                <label for="username">Nombre de Usuario</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="Contraseña">
                <label for="password">Contraseña de Red</label>
            </div>

            <button id="btn-login" class="btn btn-primary w-100 py-2 fw-semibold" type="button">Ingresar</button>
            
            <p class="mt-5 mb-3 text-body-secondary text-center">&copy; 2026 Informática y Ciberseguridad</p>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
